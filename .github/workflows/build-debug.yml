name: Build Debug APK

on:
  push:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: build-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager "ndk;26.1.10909125" --sdk_root="$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Configure Gradle user home
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.java.installations.fromEnv=JAVA_HOME" >> ~/.gradle/gradle.properties
          echo "org.gradle.java.installations.auto-detect=true" >> ~/.gradle/gradle.properties
          echo "Configured JAVA_HOME toolchain: $JAVA_HOME"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Patch ExpoModulesCorePlugin for AGP 8.x
        run: |
          python3 -c "
          with open('node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle', 'r') as f:
              content = f.read()
          content = content.replace(
              'from components.release',
              'def _rc = project.components.findByName(\"release\"); if (_rc != null) { from _rc }'
          )
          with open('node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle', 'w') as f:
              f.write(content)
          print('Patched ExpoModulesCorePlugin.gradle')
          "

      - name: Patch expo-dev-menu-interface for RN 0.76
        run: |
          python3 << 'PYEOF'
          import re, os
          path = 'node_modules/expo-dev-menu-interface/android/src/main/java/expo/interfaces/devmenu/ReactHostWrapper.kt'
          with open(path, 'r') as f:
              content = f.read()
          # jsEngineResolutionAlgorithm was removed from ReactHost in RN 0.76; Hermes is always used
          content = re.sub(
              r'return if \(reactHost\.jsEngineResolutionAlgorithm == JSEngineResolutionAlgorithm\.JSC\) \{\s*"JSC"\s*\} else \{\s*"Hermes"\s*\}',
              'return "Hermes"',
              content
          )
          # Remove now-unused import
          content = content.replace('import com.facebook.react.JSEngineResolutionAlgorithm\n', '')
          with open(path, 'w') as f:
              f.write(content)
          print('Patched ReactHostWrapper.kt')
          PYEOF

      - name: Patch expo-dev-menu for RN 0.76
        run: |
          python3 << 'PYEOF'
          import re, os

          # Fix 1: PackagerConnectionSettings changed getters/setters to a Kotlin property in RN 0.76
          path1 = 'node_modules/expo-dev-menu/android/src/main/java/expo/modules/devmenu/react/DevMenuPackagerConnectionSettings.kt'
          with open(path1, 'r') as f:
              content = f.read()
          content = re.sub(
              r'override fun getDebugServerHost\(\): String = serverIp\s*\n\s*override fun setDebugServerHost\(host: String\) = Unit',
              'override var debugServerHost: String = serverIp',
              content
          )
          with open(path1, 'w') as f:
              f.write(content)
          print('Patched DevMenuPackagerConnectionSettings.kt')

          # Fix 2: ReactHostImpl.jsEngineResolutionAlgorithm was removed in RN 0.76
          path2 = 'node_modules/expo-dev-menu/android/src/react-native-75/debug/expo/modules/devmenu/DevMenuReactHost.kt'
          with open(path2, 'r') as f:
              content = f.read()
          content = re.sub(
              r'\s*\.apply \{\s*jsEngineResolutionAlgorithm = jsResolutionAlgorithm\s*\}',
              '',
              content
          )
          with open(path2, 'w') as f:
              f.write(content)
          print('Patched DevMenuReactHost.kt')
          PYEOF

      - name: Patch expo-dev-launcher for RN 0.76
        run: |
          python3 << 'PYEOF'
          import re

          # Fix 1: PackagerConnectionSettings getter/setter → Kotlin property
          path1 = 'node_modules/expo-dev-launcher/android/src/main/java/expo/modules/devlauncher/react/DevLauncherPackagerConnectionSettings.kt'
          with open(path1, 'r') as f:
              content = f.read()
          content = re.sub(
              r'override fun getDebugServerHost\(\) = serverIp\s*\n\s*override fun setDebugServerHost\(host: String\) = Unit',
              'override var debugServerHost: String = serverIp',
              content
          )
          with open(path1, 'w') as f:
              f.write(content)
          print('Patched DevLauncherPackagerConnectionSettings.kt')

          # Fix 2: jsEngineResolutionAlgorithm removed from ReactHostImpl in RN 0.76
          path2 = 'node_modules/expo-dev-launcher/android/src/react-native-75/debug/expo/modules/devlauncher/launcher/DevLauncherReactHost.kt'
          with open(path2, 'r') as f:
              content = f.read()
          content = re.sub(
              r'\s*\.apply \{\s*jsEngineResolutionAlgorithm = jsResolutionAlgorithm\s*\}',
              '',
              content
          )
          with open(path2, 'w') as f:
              f.write(content)
          print('Patched DevLauncherReactHost.kt')
          PYEOF

      - name: Patch expo-sqlite for expo-modules-core Queues API
        run: |
          python3 -c "
          path = 'node_modules/expo-sqlite/android/src/main/java/expo/modules/sqlite/SQLiteModule.kt'
          with open(path, 'r') as f:
              content = f.read()
          # expo-modules-core changed runOnQueue() to accept Queues enum, not CoroutineScope
          content = content.replace('import kotlinx.coroutines.CoroutineScope\n', '')
          content = content.replace('import kotlinx.coroutines.Dispatchers\n', '')
          content = content.replace(
              'private val moduleCoroutineScope = CoroutineScope(Dispatchers.IO)\n',
              ''
          )
          content = content.replace(
              '.runOnQueue(moduleCoroutineScope)',
              '.runOnQueue(expo.modules.kotlin.functions.Queues.DEFAULT)'
          )
          with open(path, 'w') as f:
              f.write(content)
          print('Patched SQLiteModule.kt')
          "

      - name: Download fonts
        run: |
          FONT_DIR=assets/fonts
          BASE="https://github.com/rsms/inter/releases/download/v4.0"
          curl -fsSL "$BASE/Inter-4.0.zip" -o /tmp/inter.zip
          unzip -j /tmp/inter.zip "*/Inter-Regular.ttf" "*/Inter-Medium.ttf" "*/Inter-SemiBold.ttf" "*/Inter-Bold.ttf" -d "$FONT_DIR" || true
          JB_BASE="https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304"
          curl -fsSL "$JB_BASE/JetBrainsMono-2.304.zip" -o /tmp/jb.zip
          unzip -j /tmp/jb.zip "*/JetBrainsMono-Regular.ttf" -d "$FONT_DIR" || true
          NOTO_BASE="https://github.com/google/fonts/raw/main/ofl/notosansdevanagari"
          curl -fsSL "$NOTO_BASE/NotoSansDevanagari%5Bwdth%2Cwght%5D.ttf" -o "$FONT_DIR/NotoSansDevanagari-Regular.ttf" || true
          cp "$FONT_DIR/NotoSansDevanagari-Regular.ttf" "$FONT_DIR/NotoSansDevanagari-Medium.ttf" 2>/dev/null || true
          ls -la "$FONT_DIR/"

      - name: Generate version info
        id: version
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '-')" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

      - name: Build debug APK
        env:
          EXPO_PUBLIC_COMMIT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          set -o pipefail
          cd android && ./gradlew :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.invoked.from.ide=false \
            2>&1 | tee /tmp/gradle.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "## Build Environment" >> $GITHUB_STEP_SUMMARY
          echo "- JAVA_HOME: \`$JAVA_HOME\`" >> $GITHUB_STEP_SUMMARY
          echo "- ANDROID_SDK_ROOT: \`$ANDROID_SDK_ROOT\`" >> $GITHUB_STEP_SUMMARY
          echo "- ANDROID_NDK_HOME: \`$ANDROID_NDK_HOME\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Gradle Build Log" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### First 100 lines (config / startup errors)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -100 /tmp/gradle.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Key error lines (entire log)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "(FAILURE|FAILED|^e: |error: |BUILD FAILED|Execution failed for task|Could not resolve|Caused by: org\.gradle|Caused by: org\.jetbrains)" \
            /tmp/gradle.log | grep -v "node_modules.*Exception\|\.kt:.*Exception\|\.java:.*Exception" | head -80 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Last 200 lines" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 /tmp/gradle.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $BUILD_EXIT -ne 0 ]; then
            grep -E "(FAILED|error:|> Task|BUILD FAILED|Exception|Could not|Caused by)" /tmp/gradle.log | tail -30 | while IFS= read -r line; do
              echo "::error::$line"
            done
          fi
          exit $BUILD_EXIT

      - name: Locate and rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" \
            "./taskmind-debug-${{ steps.version.outputs.branch }}-${{ steps.version.outputs.short_sha }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 'taskmind-debug-${{ steps.version.outputs.branch }}-${{ steps.version.outputs.short_sha }}'
          path: ./taskmind-debug-*.apk
          retention-days: 30

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
          path: |
            /tmp/gradle.log
            android/app/build/reports/
            android/app/build/outputs/logs/
          retention-days: 7

      - name: Post error summary to PR
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "$(git rev-parse --abbrev-ref HEAD)" --json number -q '.[0].number' 2>/dev/null || true)
          if [ -z "$PR" ] || [ ! -f /tmp/gradle.log ]; then exit 0; fi
          printf '## Build Failed (run %s)\n\n' "${{ github.run_id }}" > /tmp/comment.md
          printf '### Error lines\n```\n' >> /tmp/comment.md
          grep -E "(FAILED|^e: |error: |BUILD FAILED|Execution failed for task|Could not resolve|Caused by: org\.gradle|Caused by: org\.jetbrains)" \
            /tmp/gradle.log | grep -v "node_modules.*Exception\|\.kt:.*Exception\|\.java:.*Exception" | head -60 >> /tmp/comment.md || true
          printf '```\n\n### First 80 lines\n```\n' >> /tmp/comment.md
          head -80 /tmp/gradle.log >> /tmp/comment.md
          printf '```\n\n### Last 80 lines\n```\n' >> /tmp/comment.md
          tail -80 /tmp/gradle.log >> /tmp/comment.md
          printf '```\n' >> /tmp/comment.md
          gh pr comment "$PR" --body-file /tmp/comment.md

      - name: Write step summary
        if: success()
        run: |
          echo "## Debug APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ steps.version.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ steps.version.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Built:** \`${{ steps.version.outputs.build_time }} UTC\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to install on your Android device:" >> $GITHUB_STEP_SUMMARY
          echo "1. Scroll down to the **Artifacts** section on this page" >> $GITHUB_STEP_SUMMARY
          echo "2. Tap the artifact name to download the ZIP" >> $GITHUB_STEP_SUMMARY
          echo "3. Extract the APK from the ZIP" >> $GITHUB_STEP_SUMMARY
          echo "4. Open the APK to install (allow 'Install from Unknown Sources' if prompted)" >> $GITHUB_STEP_SUMMARY
          echo "5. Open TaskMind and complete onboarding" >> $GITHUB_STEP_SUMMARY
