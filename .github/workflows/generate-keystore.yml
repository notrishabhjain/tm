name: Generate Release Keystore (Run Once)

# ⚠️  IMPORTANT: Trigger this workflow ONCE to generate your release keystore.
# After running, copy the base64 output from the Summary and add it to
# GitHub Secrets as ANDROID_KEYSTORE_BASE64.
# Then add the passwords you chose below as the other 3 secrets.
# Never run this workflow again after that — it would generate a NEW keystore
# (incompatible with your existing signed APKs).

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Keystore password (min 6 chars) — you will set this as ANDROID_KEYSTORE_PASSWORD secret'
        required: true
        type: string
      key_password:
        description: 'Key password (min 6 chars) — you will set this as ANDROID_KEY_PASSWORD secret'
        required: true
        type: string

jobs:
  generate:
    name: Generate Keystore
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        env:
          KEYSTORE_PASSWORD: ${{ inputs.keystore_password }}
          KEY_PASSWORD: ${{ inputs.key_password }}
        run: |
          keytool -genkeypair \
            -v \
            -keystore taskmind-release.keystore \
            -alias taskmind-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=TaskMind,O=Personal,C=IN" \
            -storepass "${KEYSTORE_PASSWORD}" \
            -keypass "${KEY_PASSWORD}"

      - name: Encode keystore as base64
        run: |
          B64=$(base64 -w 0 taskmind-release.keystore)
          echo "::add-mask::${B64}"
          echo "KEYSTORE_B64=${B64}" >> $GITHUB_ENV

      - name: Clean up keystore file
        if: always()
        run: rm -f taskmind-release.keystore

      - name: Write setup instructions to summary
        run: |
          echo "## 🔑 Keystore Generated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps (do this NOW — the keystore is not stored anywhere):" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to **Settings → Secrets and variables → Actions** in your GitHub repo" >> $GITHUB_STEP_SUMMARY
          echo "2. Add these 4 secrets:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Name | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ANDROID_KEYSTORE_BASE64\` | *(shown in the job log above — copy the masked value from the 'Encode keystore' step)* |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ANDROID_KEYSTORE_PASSWORD\` | The password you entered above |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ANDROID_KEY_ALIAS\` | \`taskmind-key\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ANDROID_KEY_PASSWORD\` | The key password you entered above |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Do NOT run this workflow again** — it would generate a different keystore." >> $GITHUB_STEP_SUMMARY
          echo "Once set up, release builds are triggered by pushing a tag: \`git tag v1.0.0 && git push --tags\`" >> $GITHUB_STEP_SUMMARY
