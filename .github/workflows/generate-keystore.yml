name: Generate Release Keystore

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Keystore password (save this, you will need it as a secret)'
        required: true
        type: string
      key_password:
        description: 'Key password (save this, you will need it as a secret)'
        required: true
        type: string

jobs:
  generate:
    name: Generate Keystore
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore taskmind.keystore \
            -alias taskmind-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=TaskMind,O=Personal,C=IN" \
            -storepass "${{ inputs.keystore_password }}" \
            -keypass "${{ inputs.key_password }}"

      - name: Base64 encode keystore
        run: |
          KEYSTORE_BASE64=$(base64 taskmind.keystore)
          echo "::add-mask::$KEYSTORE_BASE64"
          echo "keystore_base64=$KEYSTORE_BASE64" >> $GITHUB_OUTPUT
        id: encode

      - name: Write setup instructions to summary
        run: |
          echo "## Keystore Generated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Add these 4 secrets to your repository:" >> $GITHUB_STEP_SUMMARY
          echo "**Settings → Secrets and variables → Actions → New repository secret**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Name | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ANDROID_KEYSTORE_BASE64\` | *(see step logs — search for base64 output)* |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ANDROID_KEYSTORE_PASSWORD\` | The keystore password you entered |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ANDROID_KEY_ALIAS\` | \`taskmind-key\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ANDROID_KEY_PASSWORD\` | The key password you entered |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Important:** The keystore base64 is printed in the step logs above (masked)." >> $GITHUB_STEP_SUMMARY
          echo "> You must retrieve it from the raw logs before this run expires." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Once secrets are set, create a release tag to trigger the release build:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "git tag v1.0.0 && git push origin v1.0.0" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Clean up keystore file
        if: always()
        run: rm -f taskmind.keystore
