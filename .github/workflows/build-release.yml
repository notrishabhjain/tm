name: Build Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ./android/app/release.keystore

      - name: Extract version from tag
        id: version
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          EXPO_PUBLIC_COMMIT_SHA: ${{ steps.version.outputs.short_sha }}
          EXPO_PUBLIC_BUILD_TIME: ${{ steps.version.outputs.build_time }}
        run: |
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output ./taskmind-${{ steps.version.outputs.tag }}.apk

      - name: Verify APK is signed
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify \
            --verbose ./taskmind-${{ steps.version.outputs.tag }}.apk

      - name: Clean up keystore
        if: always()
        run: rm -f ./android/app/release.keystore

      - name: Extract changelog section
        id: notes
        run: |
          awk "/## \[${{ steps.version.outputs.version }}\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md > release-notes.md || echo "Release ${{ steps.version.outputs.tag }}" > release-notes.md
          [ -s release-notes.md ] || echo "Release ${{ steps.version.outputs.tag }}" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TaskMind ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: ./taskmind-${{ steps.version.outputs.tag }}.apk
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-rc') || contains(steps.version.outputs.tag, '-beta') }}

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-failure-logs-${{ github.run_id }}
          path: |
            android/app/build/reports/
          retention-days: 7
